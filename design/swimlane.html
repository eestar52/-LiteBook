<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轻记账 LiteBook — 核心业务流程泳道图</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; background: #F7F9FC; color: #2D3748; min-height: 100vh; }
  .page { max-width: 900px; margin: 0 auto; padding: 32px 24px 48px; }
  .page-header { text-align: center; margin-bottom: 32px; }
  .product-badge { display: inline-block; background: #E1F5EE; color: #0F6E56; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; }
  .page-title { font-size: 24px; font-weight: 600; color: #1A202C; margin-bottom: 6px; }
  .page-sub { font-size: 14px; color: #718096; }
  .meta-row { display: flex; justify-content: center; gap: 24px; margin-top: 12px; }
  .meta-item { font-size: 12px; color: #A0AEC0; }
  .diagram-card { background: white; border-radius: 16px; border: 1px solid #E2E8F0; padding: 24px; margin-bottom: 24px; }
  .pool-title { font-size: 13px; font-weight: 600; color: #4A5568; margin-bottom: 16px; padding-left: 8px; border-left: 3px solid #5DCAA5; }
  .pool-title.blue { border-left-color: #378ADD; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; padding-top: 16px; border-top: 1px solid #EDF2F7; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #718096; }
  .leg-box { width: 14px; height: 14px; border-radius: 4px; }
  svg text { font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="product-badge">轻记账 LiteBook · V1.0</div>
    <h1 class="page-title">核心业务流程泳道图</h1>
    <p class="page-sub">覆盖两大核心场景：用户注册首次设置 · 日常快速记账流程</p>
    <div class="meta-row">
      <span class="meta-item">产品经理：[廉凯]</span>
      <span class="meta-item">版本：V1.0</span>
      <span class="meta-item">更新：2025年</span>
    </div>
  </div>

  <!-- POOL 1 -->
  <div class="diagram-card">
    <div class="pool-title">流程一：用户注册与首次设置</div>
    <svg width="100%" viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
      </defs>
      <!-- Lane backgrounds -->
      <rect x="0" y="0" width="820" height="75" fill="#F0FBF6" rx="0"/>
      <rect x="0" y="75" width="820" height="75" fill="#F7FDF9"/>
      <rect x="0" y="150" width="820" height="75" fill="#F0FBF6"/>
      <rect x="0" y="225" width="820" height="75" fill="#F7FDF9"/>
      <!-- Lane separators -->
      <line x1="0" y1="75" x2="820" y2="75" stroke="#D4F1E4" stroke-width="1"/>
      <line x1="0" y1="150" x2="820" y2="150" stroke="#D4F1E4" stroke-width="1"/>
      <line x1="0" y1="225" x2="820" y2="225" stroke="#D4F1E4" stroke-width="1"/>
      <!-- Lane labels -->
      <rect x="0" y="0" width="90" height="300" fill="#E1F5EE"/>
      <text x="45" y="37" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">用户</text>
      <text x="45" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">App</text>
      <text x="45" y="135" text-anchor="middle" font-size="11" fill="#1D9E75">前端</text>
      <text x="45" y="187" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">服务器</text>
      <text x="45" y="262" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">AI服务</text>

      <!-- STEP 1: 打开App -->
      <circle cx="160" cy="37" r="22" fill="white" stroke="#5DCAA5" stroke-width="2"/>
      <text x="160" y="33" text-anchor="middle" font-size="10" fill="#085041" font-weight="600">开始</text>
      <text x="160" y="47" text-anchor="middle" font-size="9" fill="#1D9E75">打开App</text>
      <!-- App shows registration -->
      <rect x="122" y="90" width="76" height="34" rx="8" fill="white" stroke="#5DCAA5" stroke-width="1.5"/>
      <text x="160" y="107" text-anchor="middle" font-size="10" fill="#085041">展示注册</text>
      <text x="160" y="120" text-anchor="middle" font-size="9" fill="#1D9E75">引导页面</text>
      <line x1="160" y1="59" x2="160" y2="88" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>
      <text x="160" y="14" text-anchor="middle" font-size="10" fill="#718096">① 打开</text>

      <!-- STEP 2: 手机号 -->
      <rect x="236" y="14" width="90" height="34" rx="8" fill="white" stroke="#5DCAA5" stroke-width="1.5"/>
      <text x="281" y="27" text-anchor="middle" font-size="10" fill="#085041" font-weight="500">输入手机号</text>
      <text x="281" y="41" text-anchor="middle" font-size="9" fill="#1D9E75">填写信息</text>
      <line x1="182" y1="37" x2="234" y2="37" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>
      <text x="281" y="8" text-anchor="middle" font-size="10" fill="#718096">② 填写</text>
      <rect x="236" y="90" width="90" height="34" rx="8" fill="white" stroke="#5DCAA5" stroke-width="1.5"/>
      <text x="281" y="111" text-anchor="middle" font-size="10" fill="#085041">请求发送</text>
      <text x="281" y="123" text-anchor="middle" font-size="9" fill="#1D9E75">验证码</text>
      <line x1="281" y1="50" x2="281" y2="88" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>
      <rect x="236" y="164" width="90" height="34" rx="8" fill="white" stroke="#5DCAA5" stroke-width="1.5"/>
      <text x="281" y="179" text-anchor="middle" font-size="10" fill="#085041">生成验证码</text>
      <text x="281" y="192" text-anchor="middle" font-size="9" fill="#1D9E75">短信下发</text>
      <line x1="281" y1="126" x2="281" y2="162" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>

      <!-- STEP 3: 验证码 -->
      <rect x="348" y="14" width="90" height="34" rx="8" fill="white" stroke="#5DCAA5" stroke-width="1.5"/>
      <text x="393" y="31" text-anchor="middle" font-size="10" fill="#085041" font-weight="500">输入验证码</text>
      <text x="393" y="8" text-anchor="middle" font-size="10" fill="#718096">③ 验证</text>
      <line x1="328" y1="37" x2="346" y2="37" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>
      <rect x="348" y="90" width="90" height="34" rx="8" fill="white" stroke="#5DCAA5" stroke-width="1.5"/>
      <text x="393" y="107" text-anchor="middle" font-size="10" fill="#085041">提交验证</text>
      <text x="393" y="120" text-anchor="middle" font-size="9" fill="#1D9E75">请求</text>
      <line x1="393" y1="50" x2="393" y2="88" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>
      <rect x="348" y="164" width="90" height="34" rx="8" fill="white" stroke="#5DCAA5" stroke-width="1.5"/>
      <text x="393" y="179" text-anchor="middle" font-size="10" fill="#085041">校验并创建</text>
      <text x="393" y="192" text-anchor="middle" font-size="9" fill="#1D9E75">用户账户</text>
      <line x1="393" y1="126" x2="393" y2="162" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>
      <!-- Return arrow server → app -->
      <path d="M393 200 Q393 218 393 234 Q393 250 393 130" fill="none" stroke="#5DCAA5" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr1)"/>

      <!-- STEP 4: 设置预算 -->
      <rect x="460" y="14" width="100" height="34" rx="8" fill="white" stroke="#5DCAA5" stroke-width="1.5"/>
      <text x="510" y="31" text-anchor="middle" font-size="10" fill="#085041" font-weight="500">设置月度预算</text>
      <text x="510" y="8" text-anchor="middle" font-size="10" fill="#718096">④ 预算设置</text>
      <line x1="440" y1="37" x2="458" y2="37" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>
      <rect x="460" y="90" width="100" height="34" rx="8" fill="white" stroke="#5DCAA5" stroke-width="1.5"/>
      <text x="510" y="107" text-anchor="middle" font-size="10" fill="#085041">引导预算</text>
      <text x="510" y="120" text-anchor="middle" font-size="9" fill="#1D9E75">设置界面</text>
      <line x1="510" y1="50" x2="510" y2="88" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>
      <rect x="460" y="164" width="100" height="34" rx="8" fill="white" stroke="#5DCAA5" stroke-width="1.5"/>
      <text x="510" y="181" text-anchor="middle" font-size="10" fill="#085041">存储预算配置</text>
      <line x1="510" y1="126" x2="510" y2="162" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>
      <!-- AI initial analysis -->
      <rect x="460" y="238" width="100" height="34" rx="8" fill="white" stroke="#5DCAA5" stroke-width="1.5"/>
      <text x="510" y="255" text-anchor="middle" font-size="10" fill="#085041">初始化分类</text>
      <text x="510" y="268" text-anchor="middle" font-size="9" fill="#1D9E75">模型预热</text>
      <line x1="510" y1="200" x2="510" y2="236" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>

      <!-- STEP 5: 完成 -->
      <circle cx="680" cy="37" r="22" fill="#5DCAA5" stroke="#0F6E56" stroke-width="2"/>
      <text x="680" y="33" text-anchor="middle" font-size="10" fill="white" font-weight="600">完成</text>
      <text x="680" y="47" text-anchor="middle" font-size="9" fill="#E1F5EE">进入首页</text>
      <text x="680" y="8" text-anchor="middle" font-size="10" fill="#718096">⑤ 注册完成</text>
      <line x1="562" y1="37" x2="656" y2="37" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>
      <rect x="640" y="90" width="80" height="34" rx="8" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1.5"/>
      <text x="680" y="107" text-anchor="middle" font-size="10" fill="white">跳转首页</text>
      <text x="680" y="119" text-anchor="middle" font-size="9" fill="#E1F5EE">动效引导</text>
      <line x1="680" y1="59" x2="680" y2="88" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arr1)"/>
    </svg>
  </div>

  <!-- POOL 2 -->
  <div class="diagram-card">
    <div class="pool-title blue">流程二：日常快速记账（核心场景）</div>
    <svg width="100%" viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
        <marker id="arr2w" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
      </defs>
      <rect x="0" y="0" width="820" height="90" fill="#EBF4FF"/>
      <rect x="0" y="90" width="820" height="90" fill="#F5F9FF"/>
      <rect x="0" y="180" width="820" height="90" fill="#EBF4FF"/>
      <rect x="0" y="270" width="820" height="90" fill="#F5F9FF"/>
      <line x1="0" y1="90" x2="820" y2="90" stroke="#C5DCF5" stroke-width="1"/>
      <line x1="0" y1="180" x2="820" y2="180" stroke="#C5DCF5" stroke-width="1"/>
      <line x1="0" y1="270" x2="820" y2="270" stroke="#C5DCF5" stroke-width="1"/>
      <rect x="0" y="0" width="90" height="360" fill="#E6F1FB"/>
      <text x="45" y="45" text-anchor="middle" font-size="12" font-weight="600" fill="#0C447C">用户</text>
      <text x="45" y="135" text-anchor="middle" font-size="12" font-weight="600" fill="#0C447C">App</text>
      <text x="45" y="150" text-anchor="middle" font-size="11" fill="#378ADD">前端</text>
      <text x="45" y="225" text-anchor="middle" font-size="12" font-weight="600" fill="#0C447C">AI服务</text>
      <text x="45" y="315" text-anchor="middle" font-size="12" font-weight="600" fill="#0C447C">服务器</text>

      <!-- Step 1 -->
      <circle cx="160" cy="45" r="22" fill="white" stroke="#378ADD" stroke-width="2"/>
      <text x="160" y="41" text-anchor="middle" font-size="10" fill="#0C447C" font-weight="600">开始</text>
      <text x="160" y="55" text-anchor="middle" font-size="9" fill="#378ADD">点击「+」</text>
      <text x="160" y="14" text-anchor="middle" font-size="10" fill="#718096">① 发起记账</text>
      <rect x="120" y="104" width="80" height="34" rx="8" fill="white" stroke="#378ADD" stroke-width="1.5"/>
      <text x="160" y="121" text-anchor="middle" font-size="10" fill="#0C447C">弹出记账</text>
      <text x="160" y="133" text-anchor="middle" font-size="9" fill="#378ADD">半屏面板</text>
      <line x1="160" y1="67" x2="160" y2="102" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr2)"/>

      <!-- Step 2 -->
      <text x="280" y="14" text-anchor="middle" font-size="10" fill="#718096">② 输入金额</text>
      <rect x="232" y="20" width="96" height="34" rx="8" fill="white" stroke="#378ADD" stroke-width="1.5"/>
      <text x="280" y="33" text-anchor="middle" font-size="10" fill="#0C447C" font-weight="500">输入消费金额</text>
      <text x="280" y="46" text-anchor="middle" font-size="9" fill="#378ADD">数字键盘</text>
      <line x1="182" y1="45" x2="230" y2="45" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr2)"/>
      <rect x="232" y="104" width="96" height="34" rx="8" fill="white" stroke="#378ADD" stroke-width="1.5"/>
      <text x="280" y="121" text-anchor="middle" font-size="10" fill="#0C447C">展示数字键盘</text>
      <text x="280" y="133" text-anchor="middle" font-size="9" fill="#378ADD">实时显示金额</text>
      <line x1="280" y1="56" x2="280" y2="102" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr2)"/>
      <!-- To AI -->
      <rect x="232" y="194" width="96" height="34" rx="8" fill="white" stroke="#378ADD" stroke-width="1.5"/>
      <text x="280" y="211" text-anchor="middle" font-size="10" fill="#0C447C">接收金额</text>
      <text x="280" y="223" text-anchor="middle" font-size="9" fill="#378ADD">触发分析</text>
      <line x1="280" y1="140" x2="280" y2="192" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr2)"/>

      <!-- Step 3: AI -->
      <text x="400" y="14" text-anchor="middle" font-size="10" fill="#718096">③ AI推荐分类</text>
      <rect x="348" y="194" width="104" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="2"/>
      <text x="400" y="213" text-anchor="middle" font-size="10" fill="#0C447C" font-weight="600">智能分类推荐</text>
      <text x="400" y="226" text-anchor="middle" font-size="9" fill="#378ADD">餐饮/交通/购物...</text>
      <text x="400" y="236" text-anchor="middle" font-size="8" fill="#185FA5">准确率目标 &gt;80%</text>
      <line x1="330" y1="211" x2="346" y2="211" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr2)"/>
      <!-- Return to App -->
      <rect x="348" y="104" width="104" height="34" rx="8" fill="white" stroke="#378ADD" stroke-width="1.5"/>
      <text x="400" y="121" text-anchor="middle" font-size="10" fill="#0C447C">展示推荐分类</text>
      <text x="400" y="133" text-anchor="middle" font-size="9" fill="#378ADD">支持手动修改</text>
      <line x1="400" y1="192" x2="400" y2="140" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr2)"/>
      <!-- To User -->
      <rect x="348" y="20" width="104" height="34" rx="8" fill="white" stroke="#378ADD" stroke-width="1.5"/>
      <text x="400" y="37" text-anchor="middle" font-size="10" fill="#0C447C">查看推荐分类</text>
      <text x="400" y="49" text-anchor="middle" font-size="9" fill="#378ADD">确认或修改</text>
      <line x1="400" y1="102" x2="400" y2="56" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr2)"/>

      <!-- Step 4: Decision -->
      <text x="530" y="14" text-anchor="middle" font-size="10" fill="#718096">④ 确认分类</text>
      <polygon points="530,25 558,45 530,65 502,45" fill="white" stroke="#378ADD" stroke-width="1.5"/>
      <text x="530" y="49" text-anchor="middle" font-size="9" fill="#0C447C" font-weight="600">确认?</text>
      <line x1="454" y1="45" x2="500" y2="45" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr2)"/>
      <text x="564" y="41" font-size="9" fill="#0F6E56">是</text>
      <line x1="558" y1="45" x2="600" y2="45" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr2)"/>
      <text x="532" y="86" font-size="9" fill="#D85A30">否 → 手动选择</text>
      <line x1="530" y1="65" x2="530" y2="80" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="530" y1="80" x2="370" y2="80" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="370" y1="80" x2="370" y2="58" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr2w)"/>

      <!-- Step 5: Save -->
      <text x="640" y="14" text-anchor="middle" font-size="10" fill="#718096">⑤ 保存记录</text>
      <rect x="598" y="20" width="84" height="50" rx="8" fill="white" stroke="#378ADD" stroke-width="1.5"/>
      <text x="640" y="42" text-anchor="middle" font-size="10" fill="#0C447C" font-weight="500">点击「保存」</text>
      <text x="640" y="56" text-anchor="middle" font-size="9" fill="#378ADD">填写备注(选填)</text>
      <!-- App feedback -->
      <rect x="598" y="104" width="84" height="44" rx="8" fill="white" stroke="#378ADD" stroke-width="1.5"/>
      <text x="640" y="124" text-anchor="middle" font-size="10" fill="#0C447C">触感+动效</text>
      <text x="640" y="136" text-anchor="middle" font-size="9" fill="#378ADD">反馈确认</text>
      <text x="640" y="146" text-anchor="middle" font-size="8" fill="#185FA5">&lt; 300ms响应</text>
      <line x1="640" y1="70" x2="640" y2="102" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr2)"/>
      <!-- Server store -->
      <rect x="598" y="284" width="84" height="34" rx="8" fill="white" stroke="#378ADD" stroke-width="1.5"/>
      <text x="640" y="301" text-anchor="middle" font-size="10" fill="#0C447C">存储记账记录</text>
      <text x="640" y="313" text-anchor="middle" font-size="9" fill="#378ADD">更新统计</text>
      <line x1="640" y1="150" x2="640" y2="282" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr2)"/>
      <!-- Budget check -->
      <rect x="598" y="194" width="84" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
      <text x="640" y="213" text-anchor="middle" font-size="10" fill="#633806" font-weight="500">预算阈值检查</text>
      <text x="640" y="225" text-anchor="middle" font-size="9" fill="#854F0B">&gt;80%→预警推送</text>
      <text x="640" y="235" text-anchor="middle" font-size="8" fill="#BA7517">&gt;100%→超支提示</text>
      <line x1="640" y1="320" x2="640" y2="300" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr2w)"/>

      <!-- Step 6: Done -->
      <circle cx="760" cy="45" r="22" fill="#378ADD" stroke="#185FA5" stroke-width="2"/>
      <text x="760" y="41" text-anchor="middle" font-size="10" fill="white" font-weight="600">完成</text>
      <text x="760" y="55" text-anchor="middle" font-size="9" fill="#E6F1FB">记账成功</text>
      <line x1="684" y1="45" x2="736" y2="45" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr2)"/>
    </svg>
